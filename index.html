<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width" />
		<title>i love jerma &#x2190;</title>
	</head>

	<style type="text/css" media="screen">
		body {
			display: flex;
			flex-direction: column;
			gap: 1em;
		}

		.heading-banner {
			width: 100%;
			background-color: #ff0000;
			color: #ffffff;
			text-align: center;
			display: flex;
			justify-content: space-between;
		}

		.blender-explode {
			max-width: 4em;
			max-height: 4em;
		}

		.jerma-images {
			display: flex;
			flex-direction: row;
			justify-content: space-between;
			gap: 1em;
		}

		.funny {
			aspect-ratio: auto;
			max-height: 30vw;
			transition: all 200ms;
		}

		.funny:hover {
			transform: scale(105%);
		}

	</style>

	<body>
		<div class="heading-banner blinking">
			<img class="blender-explode" src="https://i.gifer.com/origin/58/5869b5035b6b2993997209cccd42692b_w200.gif" alt=""/>
			<h1>jerma webbed site</h1>
			<img class="blender-explode" src="https://i.gifer.com/origin/58/5869b5035b6b2993997209cccd42692b_w200.gif" alt=""/>
		</div>

		<div class="jerma-images">
			<img class="funny" src="https://media.tenor.com/YlDaMRwDI-YAAAAd/funny-jerma.gif" alt="Jerma explodes and turns into a cat"/>
			<img class="funny" src="https://i.kym-cdn.com/photos/images/original/001/858/679/9eb.gif" alt="Jerma slaps himself funny image har har"/>
			<img class="funny" src="https://media1.tenor.com/images/69206335d003a79ca95f77b64dc7c78a/tenor.gif?itemid=19817690" alt=""/>
		</div>

		<div class="jerma-images">
			<img class="funny" src="https://c.tenor.com/KLcyYVmqHhUAAAAM/jerma-re8jerma.gif" alt=""/>
			<img class="funny" src="https://i.kym-cdn.com/photos/images/original/001/879/084/63d.gif" alt=""/>
			<img class="funny" src="https://c.tenor.com/uv_Ps5Z2kQIAAAAM/jerma-jerma985.gif" alt=""/>
		</div>
	</body>

	<script charset="utf-8" defer>
		const BLINK_TIMER = 300;

		Array.from(document.getElementsByClassName("funny")).forEach(function(e) {
			let toggle = false;
			function toggleBg() {
				console.log(toggle);
				toggle = !toggle;
				e.style.transform = (toggle) ? "scale('95%')" : "scale('105%')";
				setTimeout(toggleBg, BLINK_TIMER);
			}

			setTimeout(toggleBg, BLINK_TIMER);
		});

		Array.from(document.getElementsByClassName("blinking")).forEach(function(e) {
			let toggle = false;
			function toggleBg() {
				console.log(toggle);
				toggle = !toggle;
				e.style.backgroundColor = (toggle) ? "#00ff00" : "#ff0000";
				setTimeout(toggleBg, BLINK_TIMER);
			}

			setTimeout(toggleBg, BLINK_TIMER);
		});
	</script>
</html>
